site_name: Crystal Normal Form
site_description: A Python implementation of the crystallographic mapping algorithm
repo_url: https://github.com/mcgalcode/crystal-normal-form
repo_name: crystal-normal-form

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

plugins:
  - search
  - mkdocs-jupyter:
      include_source: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - pymdownx.details

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Quickstart: quickstart.ipynb
  - Guides:
    - CNF Overview: cnf_overview.ipynb
    - Lattice Normal Form: lattice_normal_form.ipynb
    - Motif Normal Form: motif_normal_form.ipynb
    - Neighbor Finding: neighbor_finding.ipynb
