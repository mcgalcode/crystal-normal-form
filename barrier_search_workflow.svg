<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650">
  <defs>
    <!-- Gradient for phase boxes -->
    <linearGradient id="phase1Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E6BB5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="phase2Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#50B878;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3D8F5F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="phase3Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8A838;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C08820;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="phase4Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D55D5D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B54545;stop-opacity:1" />
    </linearGradient>

    <!-- Arrow marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>

    <!-- Drop shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="650" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#333">
    CNF 4-Phase Barrier Search Algorithm
  </text>

  <!-- Input box -->
  <rect x="50" y="60" width="160" height="70" rx="8" fill="#e9ecef" stroke="#adb5bd" stroke-width="2" filter="url(#shadow)"/>
  <text x="130" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#495057">Input</text>
  <text x="130" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6c757d">Start Structure</text>
  <text x="130" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6c757d">End Structure</text>

  <!-- Relaxation step -->
  <rect x="240" y="60" width="140" height="70" rx="8" fill="#dde5ed" stroke="#8ba4bd" stroke-width="2" filter="url(#shadow)"/>
  <text x="310" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#495057">Preprocessing</text>
  <text x="310" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6c757d">Relax endpoints</text>
  <text x="310" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6c757d">with GRACE</text>

  <!-- Arrow from input to relaxation -->
  <line x1="210" y1="95" x2="235" y2="95" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Phase 1: Search -->
  <g transform="translate(50, 155)">
    <rect x="0" y="0" width="380" height="110" rx="10" fill="url(#phase1Grad)" filter="url(#shadow)"/>
    <rect x="10" y="8" width="55" height="22" rx="4" fill="rgba(255,255,255,0.25)"/>
    <text x="37" y="23" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Phase 1</text>
    <text x="190" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">Parameter Search</text>

    <text x="20" y="50" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.95)">• Binary search for optimal min_distance at each resolution</text>
    <text x="20" y="67" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.95)">• Tests xi/delta combinations in parallel</text>
    <text x="20" y="84" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.95)">• Uses fast Rust A* (geometric filters only)</text>

    <rect x="270" y="48" width="100" height="50" rx="5" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="320" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">Output:</text>
    <text x="320" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.9)">ξ, δ, min_dist</text>
  </g>

  <!-- Arrow from relaxation to Phase 1 -->
  <path d="M 380 95 L 410 95 L 410 140 L 240 140 L 240 155" stroke="#555" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Phase 2: Sample -->
  <g transform="translate(50, 285)">
    <rect x="0" y="0" width="380" height="110" rx="10" fill="url(#phase2Grad)" filter="url(#shadow)"/>
    <rect x="10" y="8" width="55" height="22" rx="4" fill="rgba(255,255,255,0.25)"/>
    <text x="37" y="23" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Phase 2</text>
    <text x="190" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">Path Sampling</text>

    <text x="20" y="50" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.95)">• Sample diverse paths with varied dropout</text>
    <text x="20" y="67" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.95)">• Calculate energies along each path</text>
    <text x="20" y="84" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.95)">• Discover initial energy ceiling from best path</text>

    <rect x="270" y="48" width="100" height="50" rx="5" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="320" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">Output:</text>
    <text x="320" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.9)">initial ceiling</text>
  </g>

  <!-- Arrow from Phase 1 to Phase 2 -->
  <line x1="240" y1="265" x2="240" y2="280" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Phase 3: Sweep -->
  <g transform="translate(470, 155)">
    <rect x="0" y="0" width="380" height="110" rx="10" fill="url(#phase3Grad)" filter="url(#shadow)"/>
    <rect x="10" y="8" width="55" height="22" rx="4" fill="rgba(255,255,255,0.25)"/>
    <text x="37" y="23" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Phase 3</text>
    <text x="190" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">Ceiling Sweep</text>

    <text x="20" y="50" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.95)">• Parallel workers at multiple ceiling levels</text>
    <text x="20" y="67" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.95)">• Energy filtering prunes high-energy neighbors</text>
    <text x="20" y="84" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.95)">• Multi-resolution refinement (ξ↓, δ↑)</text>

    <rect x="270" y="48" width="100" height="50" rx="5" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="320" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">Output:</text>
    <text x="320" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.9)">refined ceiling</text>
  </g>

  <!-- Phase 4: Ratchet -->
  <g transform="translate(470, 285)">
    <rect x="0" y="0" width="380" height="110" rx="10" fill="url(#phase4Grad)" filter="url(#shadow)"/>
    <rect x="10" y="8" width="55" height="22" rx="4" fill="rgba(255,255,255,0.25)"/>
    <text x="37" y="23" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Phase 4</text>
    <text x="190" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">Ratchet Refinement</text>

    <text x="20" y="50" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.95)">• Serial refinement with adaptive parameters</text>
    <text x="20" y="67" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.95)">• Ceiling ratchets down with each successful path</text>
    <text x="20" y="84" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.95)">• Converges to minimum energy barrier</text>

    <rect x="270" y="48" width="100" height="50" rx="5" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="320" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">Output:</text>
    <text x="320" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.9)">final barrier</text>
  </g>

  <!-- Arrow from Phase 2 to Phase 3 -->
  <path d="M 430 340 L 450 340 L 450 210 L 465 210" stroke="#555" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Arrow from Phase 3 to Phase 4 -->
  <line x1="660" y1="265" x2="660" y2="280" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Output box -->
  <rect x="690" y="420" width="160" height="70" rx="8" fill="#e9ecef" stroke="#adb5bd" stroke-width="2" filter="url(#shadow)"/>
  <text x="770" y="448" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#495057">Result</text>
  <text x="770" y="467" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6c757d">Optimized barrier</text>
  <text x="770" y="482" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6c757d">Best path trajectory</text>

  <!-- Arrow from Phase 4 to Output -->
  <path d="M 660 395 L 660 455 L 685 455" stroke="#555" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Legend -->
  <g transform="translate(50, 430)">
    <rect x="0" y="0" width="380" height="160" rx="8" fill="white" stroke="#dee2e6" stroke-width="1" filter="url(#shadow)"/>
    <text x="190" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333">Key Characteristics</text>

    <!-- Parallel indicator -->
    <rect x="20" y="45" width="15" height="15" rx="3" fill="#4A90D9"/>
    <rect x="25" y="50" width="15" height="15" rx="3" fill="#4A90D9" opacity="0.7"/>
    <text x="55" y="58" font-family="Arial, sans-serif" font-size="11" fill="#495057">Parallel execution (workers)</text>
    <text x="220" y="58" font-family="Arial, sans-serif" font-size="10" fill="#6c757d">Phases 1, 2, 3</text>

    <!-- Serial indicator -->
    <rect x="20" y="75" width="25" height="15" rx="3" fill="#D55D5D"/>
    <text x="55" y="88" font-family="Arial, sans-serif" font-size="11" fill="#495057">Serial execution (single thread)</text>
    <text x="220" y="88" font-family="Arial, sans-serif" font-size="10" fill="#6c757d">Phase 4</text>

    <!-- Rust indicator -->
    <text x="20" y="118" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#E57324">Rust</text>
    <text x="55" y="118" font-family="Arial, sans-serif" font-size="11" fill="#495057">Fast A* (geometric filters only)</text>
    <text x="220" y="118" font-family="Arial, sans-serif" font-size="10" fill="#6c757d">Phases 1, 2</text>

    <!-- Python indicator -->
    <text x="20" y="138" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3776AB">Python</text>
    <text x="55" y="138" font-family="Arial, sans-serif" font-size="11" fill="#495057">A* with energy filtering</text>
    <text x="220" y="138" font-family="Arial, sans-serif" font-size="10" fill="#6c757d">Phases 3, 4</text>
  </g>

  <!-- Data flow annotations -->
  <g font-family="Arial, sans-serif" font-size="9" fill="#888">
    <text x="240" y="278" text-anchor="middle">ξ, δ, min_dist</text>
    <text x="462" y="275" text-anchor="end">ceiling</text>
    <text x="660" y="278" text-anchor="middle">ceiling</text>
    <text x="673" y="428" text-anchor="end">barrier</text>
  </g>
</svg>
